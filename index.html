<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Parent Volunteer Signup</title>

<link rel="stylesheet" href="styles.css">

</head>

<body>

<div class="container">

<div class="header">
<h1>Parent Volunteer Signup</h1>
<p class="subtext">
Parents can volunteer for upcoming events. The dashboard shows coverage so far.
</p>
</div>

<div class="tabs">

<button class="tab-btn active" data-tab="signup">
Signup Form
</button>

<button class="tab-btn dashboard-tab" data-tab="dashboard">
Volunteer Matrix
</button>

</div>


<!-- SIGNUP TAB -->

<section id="signup" class="tab-panel active">

<div class="grid">

<div class="card">

<h2>Volunteer Registration</h2>

<form id="volunteerForm">

<label>Event *</label>
<select id="eventId" required>
<option value="">Loading events...</option>
</select>

<label>Parent Name *</label>
<input id="parentName" required>

<label>Email *</label>
<input id="email" type="email" required>

<label>Phone *</label>
<input id="phone" required>

<label>Kid Represented</label>
<input id="kidName">

<label>Volunteer Role</label>
<select id="volunteerRole">
<option value="Judge">Judge</option>
<option value="Check-in">Check-in</option>
<option value="Runner">Runner</option>
<option value="Hospitality">Hospitality</option>
<option value="General Volunteer">General Volunteer</option>
</select>

<label>Notes</label>
<textarea id="notes"></textarea>

<button type="submit">
Submit Volunteer Info
</button>

<div id="formStatus" class="status"></div>

</form>

</div>


<div class="card">

<h2>Upcoming Events</h2>

<div id="eventsList"></div>

</div>

</div>

</section>


<!-- DASHBOARD TAB -->

<section id="dashboard" class="tab-panel">

<div class="card">

<h2>Volunteer Matrix</h2>

<div class="stats">

<div class="stat-box">
<div class="stat-label">Total Parents</div>
<div id="totalParents" class="stat-value">0</div>
</div>

<div class="stat-box">
<div class="stat-label">Kids Represented</div>
<div id="totalKids" class="stat-value">0</div>
</div>

<div class="stat-box">
<div class="stat-label">Judges</div>
<div id="totalJudges" class="stat-value">0</div>
</div>

<div class="stat-box">
<div class="stat-label">Events Covered</div>
<div id="eventsCovered" class="stat-value">0</div>
</div>

</div>


<h3>Event Summary</h3>

<table>

<thead>
<tr>
<th>Event</th>
<th>Date</th>
<th>Parents</th>
<th>Kids</th>
<th>Judges</th>
</tr>
</thead>

<tbody id="summaryTableBody"></tbody>

</table>

</div>

</section>

</div>

<script src="app.js"></script>

</body>
</html>
